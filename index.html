{name:"Sebas",pj:14,pg:5,pe:2,pp:7},{name:"Lauti",pj:10,pg:5,pe:1,pp:4},
{name:"Agus",pj:5,pg:4,pe:1,pp:0},{name:"Fede",pj:8,pg:4,pe:1,pp:3},
{name:"Alexis",pj:8,pg:4,pe:0,pp:4},{name:"Carly",pj:6,pg:3,pe:0,pp:3},
{name:"Benja",pj:10,pg:3,pe:1,pp:6},{name:"Pipa",pj:5,pg:2,pe:0,pp:3},
{name:"Carlos",pj:1,pg:1,pe:0,pp:0},{name:"Walter",pj:1,pg:1,pe:0,pp:0},
{name:"Leo2",pj:1,pg:0,pe:0,pp:1},{name:"Alan",pj:3,pg:0,pe:0,pp:3},
{name:"Alejo",pj:2,pg:0,pe:0,pp:2},{name:"Edu",pj:1,pg:0,pe:0,pp:1},
];
let S={players:deep(DEFAULTS),matches:[]};
let tB=new Set(),tN=new Set(),resG='blanco';
function deep(x){return JSON.parse(JSON.stringify(x));}
function load(){try{const d=JSON.parse(localStorage.getItem('jfp4'));if(d?.players)S.players=d.players;if(d?.matches)S.matches=d.matches;}catch(e){}}
function save(){try{localStorage.setItem('jfp4',JSON.stringify({players:S.players,matches:S.matches}));}catch(e){}}
function pts(p){return p.pg*3+p.pe;}
function efec(p){return p.pj===0?0:Math.round(pts(p)/(p.pj*3)*100);}
function sorted(){return[...S.players].sort((a,b)=>pts(b)-pts(a)||efec(b)-efec(a));}
function pos(n){return sorted().findIndex(p=>p.name===n)+1;}
function eClass(e){return e>=65?'b-hi':e>=45?'b-mid':'b-lo';}
function medal(i){return['🥇','🥈','🥉'][i]??(i+1);}
function eColor(e){return e>=65?'var(--g)':e>=45?'var(--orange)':'var(--red)';}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function animCount(el,target,dur=900){let s=null;const f=(ts)=>{if(!s)s=ts;const p=Math.min((ts-s)/dur,1);el.textContent=Math.round(p*target);if(p<1)requestAnimationFrame(f);else el.textContent=target;};requestAnimationFrame(f);}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');}
function goAdminLogin(){show('login');setTimeout(()=>document.getElementById('pwd').focus(),100);}
function doLogin(){if(document.getElementById('pwd').value===PASS){document.getElementById('pwd').value='';document.getElementById('login-err').style.display='none';show('admin');renderTable();initP();}else{document.getElementById('login-err').style.display='block';}}
function doLogout(){show('home');}
function tab(t){['tabla','partido','historial','compartir'].forEach(x=>{document.getElementById('t-'+x).classList.toggle('active',x===t);document.getElementById('p-'+x).style.display=x===t?'':'none';});if(t==='tabla')renderTable();if(t==='historial')renderHist();if(t==='partido')initP();document.getElementById('fab').style.display=t==='partido'?'flex':'none';}
function renderTable(){const rows=sorted();document.getElementById('admin-tbody').innerHTML=rows.map((p,i)=>{const e=efec(p),rc=i<3?' class="r'+(i+1)+'"':' class=""';return'<tr'+rc+' onclick="adminCard(\''+p.name+'\')"><td style="color:var(--muted);font-size:12px;">'+medal(i)+'</td><td>'+p.name+'</td><td style="color:var(--muted)">'+p.pj+'</td><td style="color:var(--g);font-weight:700">'+p.pg+'</td><td style="color:var(--orange)">'+p.pe+'</td><td style="color:var(--red)">'+p.pp+'</td><td style="font-weight:800;font-size:16px">'+pts(p)+'</td><td><span class="badge '+eClass(e)+'">'+e+'%</span></td></tr>';}).join('');}
function adminCard(name){S.curPlayer=name;document.getElementById('btn-present').style.display='flex';document.getElementById('card-back').onclick=()=>{show('admin');renderTable();};document.getElementById('card-title').textContent=name;renderCard('card-content',name);show('card');}
function initP(){tB=new Set();tN=new Set();resG='blanco';document.getElementById('match-date').value=todayStr();selRes('blanco');renderCols();checkBtn();}
function renderCols(){const all=[...S.players].sort((a,b)=>a.name.localeCompare(b.name));['blanco','negro'].forEach(team=>{const ts=team==='blanco'?tB:tN;document.getElementById('col-'+team).innerHTML=all.map(p=>{const sel=ts.has(p.name);return'<div class="tp-item'+(sel?' sel-'+team:'')+'" onclick="toggle(\''+p.name+'\',\''+team+'\')">'+'<div class="tp-check'+(sel?' '+team+'">✓':'">') +'</div><div class="tp-name">'+p.name+'</div></div>';}).join('');document.getElementById('cnt-'+team).textContent=ts.size;});checkBtn();}
function toggle(name,team){const c=team==='blanco'?tB:tN,o=team==='blanco'?tN:tB;if(c.has(name))c.delete(name);else{o.delete(name);c.add(name);}renderCols();}
function selRes(r){resG=r;['blanco','empate','negro'].forEach(x=>{document.getElementById('ro-'+x).className='res-opt'+(x===r?' sel-'+x:'');});}
function checkBtn(){document.getElementById('btn-ok').disabled=!(tB.size>0&&tN.size>0);}
function confirmMatch(){const sB=[...tB],sN=[...tN];if(!sB.length||!sN.length)return;const ds=fmtDate(document.getElementById('match-date').value)||todayStr();const snap=deep({players:S.players,matches:S.matches});S.players=S.players.map(p=>{const inB=tB.has(p.name),inN=tN.has(p.name);if(!inB&&!inN)return p;if(resG==='empate')return{...p,pj:p.pj+1,pe:p.pe+1};const g=(resG==='blanco'&&inB)||(resG==='negro'&&inN);return g?{...p,pj:p.pj+1,pg:p.pg+1}:{...p,pj:p.pj+1,pp:p.pp+1};});const gl=resG==='empate'?'Empate':resG==='blanco'?'Gano Blanco':'Gano Negro';S.matches.unshift({label:ds+' - '+gl+' | Blanco: '+sB.join(', ')+' | Negro: '+sN.join(', '),snap,date:ds,result:resG,teamB:sB,teamN:sN});save();renderTable();toast('Fecha '+ds+' registrada!');initP();}
function undoLast(){if(!S.matches.length){toast('No hay fecha para deshacer');return;}const{snap}=S.matches[0];S.players=snap.players;S.matches=snap.matches;save();renderTable();initP();toast('Ultima fecha deshecha');}
function addNewPlayer(){const name=document.getElementById('new-player-name').value.trim();if(!name){toast('Ingresa un nombre');return;}if(S.players.find(p=>p.name.toLowerCase()===name.toLowerCase())){toast('Ya existe');return;}S.players.push({name,pj:0,pg:0,pe:0,pp:0});save();renderTable();renderCols();document.getElementById('new-player-name').value='';toast(name+' agregado!');}
function renderHist(){document.getElementById('hist-list').innerHTML=!S.matches.length?'<div style="text-align:center;padding:48px;color:var(--muted);font-size:14px;">Sin fechas registradas</div>':S.matches.map((m,i)=>{const isLast=i===0;return'<div class="m-item"><div class="m-item-text">'+(isLast?'<span class="badge b-hi" style="font-size:10px;margin-right:4px;">ULTIMA</span>':'')+m.label+'</div><div class="m-item-actions"><button class="m-act-btn" onclick="editMatchDate('+i+')" title="Editar fecha">✏️</button>'+(isLast?'<button class="m-act-btn danger" onclick="deleteMatch('+i+')" title="Borrar">🗑️</button>':'')+'</div></div>';}).join('');}
function editMatchDate(i){const m=S.matches[i];if(!m)return;const current=m.date||(m.label.split(' - ')[0]);const input=prompt('Nueva fecha (formato dd/mm/aaaa):',current);if(!input)return;if(!/^\d{2}\/\d{2}\/\d{4}$/.test(input)){toast('Formato invalido. Usa dd/mm/aaaa');return;}m.label=m.label.replace(current,input);m.date=input;save();renderHist();toast('Fecha actualizada a '+input);}
function deleteMatch(i){if(i!==0){toast('Solo se puede borrar la ultima fecha cargada');return;}if(!confirm('Seguro que queres borrar esta fecha? Se revertiran los puntos de esos jugadores.'))return;undoLast();renderHist();}
let _url='';
function genLink(){const data={players:S.players,matches:S.matches.map(m=>({label:m.label}))};const code=btoa(unescape(encodeURIComponent(JSON.stringify(data))));_url=location.origin+location.pathname+'#sync='+code;document.getElementById('share-url').textContent=_url;document.getElementById('share-box').style.display='block';}
function copyLink(){navigator.clipboard?.writeText(_url).then(()=>toast('Link copiado!')).catch(()=>{fallCopy(_url);toast('Link copiado!');});}
function shareLink(){if(navigator.share)navigator.share({title:'Jueves Futbol Point',text:'Mira tu posicion!',url:_url});else copyLink();}
function fallCopy(t){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);}
function doImport(){const code=document.getElementById('import-in').value.trim();if(!code)return;try{let c=code;if(c.includes('#sync='))c=c.split('#sync=')[1];const d=JSON.parse(decodeURIComponent(escape(atob(c))));if(d?.players){S.players=d.players;if(d.matches)S.matches=d.matches;save();renderTable();toast('Datos importados!');document.getElementById('import-in').value='';}}catch(e){toast('Codigo invalido');}}
function goPlayerSelect(){renderList();show('players');}
function renderList(q=''){const s=sorted(),f=q?s.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())):s;document.getElementById('p-list').innerHTML=f.map(p=>{const pn=pos(p.name);return'<div class="p-item" onclick="viewCard(\''+p.name+'\')"><div><div class="p-item-name">'+p.name+'</div><div class="p-item-sub"><span class="sub-pos">Pos. '+pn+'</span> | <span class="sub-pts">'+pts(p)+' pts</span> | <span class="sub-efec">'+efec(p)+'%</span> | <span class="sub-stats">PJ:'+p.pj+' - PG:'+p.pg+' - PE:'+p.pe+' - PP:'+p.pp+'</span></div></div><div style="font-size:26px;">'+(pn<=3?['🥇','🥈','🥉'][pn-1]:'▶')+'</div></div>';}).join('');}
function filterList(){renderList(document.getElementById('p-search').value);}
function playerSync(){const code=document.getElementById('sync-in').value.trim();if(!code)return;try{let c=code;if(c.includes('#sync='))c=c.split('#sync=')[1];const d=JSON.parse(decodeURIComponent(escape(atob(c))));if(d?.players){S.players=d.players;if(d.matches)S.matches=d.matches;save();renderList();document.getElementById('sync-in').value='';toast('Datos actualizados!');}}catch(e){toast('Codigo invalido');}}
function viewCard(name){S.curPlayer=name;document.getElementById('btn-present').style.display='none';document.getElementById('card-back').onclick=()=>show('players');document.getElementById('card-title').textContent=name;renderCard('card-content',name);show('card');}
function renderCard(cid,name){const p=S.players.find(x=>x.name===name);if(!p)return;const pn=pos(name),e=efec(p),ptsV=pts(p),clr=eColor(e);const pE=pn===1?'🥇':pn===2?'🥈':pn===3?'🥉':'#'+pn;document.getElementById(cid).innerHTML='<div class="p-card"><div class="p-name">'+name+'</div><div style="position:relative;z-index:1"><span class="p-pos-badge">'+pE+' Puesto '+pn+' de '+S.players.length+'</span></div><div class="p-pts" id="pc">0</div><div class="p-pts-lbl">Puntos</div><div class="p-stats" style="position:relative;z-index:1;"><div class="stat-box"><div class="stat-val" style="color:var(--g)" id="sg">0</div><div class="stat-lbl">Ganados</div></div><div class="stat-box"><div class="stat-val" style="color:var(--orange)" id="se">0</div><div class="stat-lbl">Empates</div></div><div class="stat-box"><div class="stat-val" style="color:var(--red)" id="sp">0</div><div class="stat-lbl">Perdidos</div></div></div><div style="margin-bottom:14px;position:relative;z-index:1;"><div class="efec-row"><span>Efectividad</span><span style="color:'+clr+';font-weight:800;">'+e+'%</span></div><div class="efec-bar-bg"><div class="efec-bar-fill" id="eb" style="background:'+clr+'"></div></div></div><div style="font-size:12px;color:var(--muted);position:relative;z-index:1;">'+p.pj+' partidos jugados</div></div><div style="padding:0 16px 16px;"><div style="background:var(--bg2);border-radius:14px;padding:14px 16px;border:1px solid var(--border);"><div style="font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">Tabla completa</div>'+sorted().map((pl,i)=>'<div class="mini-row'+(pl.name===name?' me':'')+'"><div style="width:22px;font-size:13px;text-align:center;">'+medal(i)+'</div><div style="flex:1;font-weight:'+(pl.name===name?800:400)+';color:'+(pl.name===name?'var(--g)':'inherit')+'">'+pl.name+'</div><div style="font-weight:700;font-size:14px;">'+pts(pl)+'</div></div>').join('')+'</div></div>';setTimeout(()=>{animCount(document.getElementById('pc'),ptsV,900);animCount(document.getElementById('sg'),p.pg,700);animCount(document.getElementById('se'),p.pe,700);animCount(document.getElementById('sp'),p.pp,700);const b=document.getElementById('eb');if(b)b.style.width=e+'%';},100);}
function goPresent(){renderCard('present-content',S.curPlayer);show('present');}
let _tt;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2800);}
load();
const hash=location.hash;
if(hash.startsWith('#sync=')){try{const d=JSON.parse(decodeURIComponent(escape(atob(hash.slice(6)))));if(d?.players){S.players=d.players;if(d.matches)S.matches=d.matches;save();}}catch(e){}history.replaceState(null,'',location.pathname);goPlayerSelect();}
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});}
</script>
</body>
