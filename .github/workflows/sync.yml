name: Prode Mundial 2026 — Sync + Notificaciones

on:
  schedule:
    - cron: '*/10 * * * *'   # sync resultados cada 10 min
    - cron: '0 12 * * *'     # notificación 9am Argentina (12 UTC)
    - cron: '0 15 * * *'     # notificación 12pm Argentina (15 UTC)
    - cron: '0 17 * * *'     # alerta 2hs antes turno tarde (14 UTC)
    - cron: '0 19 * * *'     # alerta 2hs antes turno noche (16 UTC)
  workflow_dispatch:

jobs:
  sync-resultados:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sincronizar resultados
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node sync.js

  notificaciones:
    runs-on: ubuntu-latest
    needs: sync-resultados
    if: ${{ secrets.ONESIGNAL_APP_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enviar notificaciones
        env:
          ONESIGNAL_APP_ID:  ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: node notify.js
